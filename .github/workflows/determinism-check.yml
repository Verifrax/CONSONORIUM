name: Determinism Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  determinism:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compute stable digest inventory
        run: |
          set -euo pipefail
          find . -type f ! -path "./.git/*" | LC_ALL=C sort | xargs shasum -a 256 > .determinism-current.txt
      - name: Verify stable ordering
        run: |
          set -euo pipefail
          cp .determinism-current.txt .determinism-copy.txt
          diff -u .determinism-current.txt .determinism-copy.txt

      - name: Verify inventory fixture matches live output
        run: |
          set -euo pipefail
          python3 cli/consonorium.py inventory > /tmp/inventory.json
          diff -u fixtures/cli/inventory.expected.json /tmp/inventory.json
      - name: Run CLI mode tests
        run: |
          set -euo pipefail
          python3 -m unittest tests/test_cli_modes.py

      - name: Verify inventory fixture matches live output
        run: |
          set -euo pipefail
          python3 cli/consonorium.py inventory > /tmp/inventory.json
          diff -u fixtures/cli/inventory.expected.json /tmp/inventory.json

      - name: Run CLI mode tests
        run: |
          set -euo pipefail
          python3 -m unittest tests/test_cli_modes.py

      - name: Verify materialized report matches live inventory output
        run: |
          set -euo pipefail
          python3 cli/consonorium.py inventory > /tmp/inventory.json
          diff -u reports/generated/sovereign-inventory-report.json /tmp/inventory.json

      - name: Run inventory report tests
        run: |
          set -euo pipefail
          python3 -m unittest tests/test_inventory_report.py

      - name: Verify epoch-candidate report matches live output
        run: |
          set -euo pipefail
          python3 cli/consonorium.py publish-epoch-candidate > /tmp/epoch-candidate.json
          diff -u reports/generated/sovereign-epoch-candidate.json /tmp/epoch-candidate.json

      - name: Run epoch-candidate tests
        run: |
          set -euo pipefail
          python3 -m unittest tests/test_epoch_candidate.py

      - name: Verify check report matches live output
        run: |
          set -euo pipefail
          python3 cli/consonorium.py publish-checks > /tmp/check-report.json
          diff -u reports/generated/sovereign-check-report.json /tmp/check-report.json

      - name: Run check report tests
        run: |
          set -euo pipefail
          python3 -m unittest tests/test_check_report.py
