name: Determinism Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  determinism:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compute stable digest inventory
        run: |
          set -euo pipefail
          find . -type f ! -path "./.git/*" | LC_ALL=C sort | xargs shasum -a 256 > .determinism-current.txt
      - name: Verify stable ordering
        run: |
          set -euo pipefail
          cp .determinism-current.txt .determinism-copy.txt
          diff -u .determinism-current.txt .determinism-copy.txt

      - name: Verify inventory fixture matches live output
        run: |
          set -euo pipefail
          python3 cli/consonorium.py inventory > /tmp/inventory.json
          diff -u fixtures/cli/inventory.expected.json /tmp/inventory.json
      - name: Run CLI mode tests
        run: |
          set -euo pipefail
          python3 -m unittest tests/test_cli_modes.py

      - name: Verify inventory fixture matches live output
        run: |
          set -euo pipefail
          python3 cli/consonorium.py inventory > /tmp/inventory.json
          diff -u fixtures/cli/inventory.expected.json /tmp/inventory.json

      - name: Run CLI mode tests
        run: |
          set -euo pipefail
          python3 -m unittest tests/test_cli_modes.py

      - name: Verify materialized report matches live inventory output
        run: |
          set -euo pipefail
          python3 cli/consonorium.py inventory > /tmp/inventory.json
          diff -u reports/generated/sovereign-inventory-report.json /tmp/inventory.json

      - name: Run inventory report tests
        run: |
          set -euo pipefail
          python3 -m unittest tests/test_inventory_report.py

      - name: Verify epoch-candidate report matches live output
        run: |
          set -euo pipefail
          python3 cli/consonorium.py publish-epoch-candidate > /tmp/epoch-candidate.json
          diff -u reports/generated/sovereign-epoch-candidate.json /tmp/epoch-candidate.json

      - name: Run epoch-candidate tests
        run: |
          set -euo pipefail
          python3 -m unittest tests/test_epoch_candidate.py

      - name: Verify check report matches live output
        run: |
          set -euo pipefail
          python3 cli/consonorium.py publish-checks > /tmp/check-report.json
          diff -u reports/generated/sovereign-check-report.json /tmp/check-report.json

      - name: Run check report tests
        run: |
          set -euo pipefail
          python3 -m unittest tests/test_check_report.py

      - name: Verify reconcile report matches live output
        run: |
          set -euo pipefail
          python3 cli/consonorium.py reconcile > /tmp/reconcile-report.json
          diff -u reports/generated/sovereign-reconcile-report.json /tmp/reconcile-report.json

      - name: Run reconcile report tests
        run: |
          set -euo pipefail
          python3 -m unittest tests/test_reconcile_report.py

      - name: Verify audit report matches live output
        run: |
          set -euo pipefail
          python3 cli/consonorium.py audit > /tmp/audit-report.json
          diff -u reports/generated/sovereign-audit-report.json /tmp/audit-report.json

      - name: Run audit report tests
        run: |
          set -euo pipefail
          python3 -m unittest tests/test_audit_report.py

      - name: Verify quarantine report matches live output
        run: |
          set -euo pipefail
          python3 cli/consonorium.py quarantine > /tmp/quarantine-report.json
          diff -u reports/generated/sovereign-quarantine-report.json /tmp/quarantine-report.json

      - name: Run quarantine report tests
        run: |
          set -euo pipefail
          python3 -m unittest tests/test_quarantine_report.py

      - name: Verify repair-plan report matches live output
        run: |
          set -euo pipefail
          python3 cli/consonorium.py plan-repairs > /tmp/repair-plan.json
          diff -u reports/generated/sovereign-repair-plan.json /tmp/repair-plan.json

      - name: Run repair-plan tests
        run: |
          set -euo pipefail
          python3 -m unittest tests/test_repair_plan.py

      - name: Verify mechanical-repair application report matches live output
        run: |
          set -euo pipefail
          python3 cli/consonorium.py apply-mechanical-repairs > /tmp/mechanical-repair-application.json
          diff -u reports/generated/sovereign-mechanical-repair-application.json /tmp/mechanical-repair-application.json

      - name: Run mechanical-repair application tests
        run: |
          set -euo pipefail
          python3 -m unittest tests/test_apply_mechanical_repairs.py
