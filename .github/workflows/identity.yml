name: Identity

on:
  pull_request:
  push:
    branches: [main]

jobs:
  identity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify root identity files
        run: |
          set -euo pipefail
          test -f README.md
          test -f RUNTIME.md
          test -f VERSION
          test -f LICENSE
      - name: Verify required directories
        run: |
          set -euo pipefail
          for d in             app/github-app             collectors/github collectors/npm collectors/http collectors/dns collectors/pages collectors/artifacts collectors/evidence             normalizers graph             evaluators/invariants evaluators/contracts evaluators/contradictions evaluators/trust             planners/repair planners/quarantine planners/projection             compilers/readme compilers/host compilers/badge compilers/evidence-index compilers/reports             publishers/checks publishers/issues publishers/prs publishers/epochs             workflows cli tests fixtures
          do
            test -d "$d"
          done
      - name: Verify README boundary strings
        run: |
          set -euo pipefail
          grep -Fqx "# CONSONORIUM" README.md
          grep -Fq "CONSONORIUM is the reconciliation and runtime repository for the Verifrax system." README.md
          grep -Fq "CONSONORIUM does not define constitutional law." README.md
          grep -Fq "SYNTAGMARIUM -> CONSONORIUM -> ORBISTIUM" README.md

      - name: Verify CLI surface files
        run: |
          set -euo pipefail
          test -f cli/consonorium.py
          test -f fixtures/cli/inventory.expected.json
          test -f tests/test_cli_modes.py

      - name: Verify sovereign inventory fixture
        run: |
          set -euo pipefail
          test -f fixtures/sovereign/inventory.json

      - name: Reject generated Python cache artifacts
        run: |
          set -euo pipefail
          if find . \( -path "*/__pycache__/*" -o -name "*.pyc" -o -name "*.pyo" \) | grep -q .; then
            echo "Generated Python cache artifacts are not allowed in the repository."
            exit 1
          fi

      - name: Verify materialized inventory report surface
        run: |
          set -euo pipefail
          test -f reports/generated/sovereign-inventory-report.json
          test -f tests/test_inventory_report.py

      - name: Verify epoch-candidate report surface
        run: |
          set -euo pipefail
          test -f reports/generated/sovereign-epoch-candidate.json
          test -f tests/test_epoch_candidate.py
